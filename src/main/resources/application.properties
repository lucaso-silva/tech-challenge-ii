spring.application.name=tech-challenge-ii

# Active profile
spring.profiles.active=dev

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.br.com.fiap=TRACE

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

---
# Development Profile (H2)
spring.config.activate.on-profile=dev

spring.datasource.url=jdbc:h2:mem:restaurant_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

---
# Production Profile (PostgreSQL)
spring.config.activate.on-profile=prod

spring.datasource.url=jdbc:postgresql://localhost:5432/restaurant_db
spring.datasource.username=${DB_USERNAME:restaurant_user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
