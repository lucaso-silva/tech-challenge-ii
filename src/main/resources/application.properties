spring.application.name=tech-challenge-ii

# Active profile
spring.profiles.active=dev

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.br.com.fiap=TRACE

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.defer-datasource-initialization=true


# Development Profile (H2)
spring.config.activate.on-profile=dev

spring.datasource.url=jdbc:h2:mem:restaurant_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


# Production Profile (PostgreSQL)
spring.config.activate.on-profile=prod

spring.datasource.url=jdbc:postgresql://postgres:5432/restaurant_db
spring.datasource.username=${DB_USERNAME:restaurant_user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
